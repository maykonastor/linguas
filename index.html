  :root{

  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}

  #app{flex:1; overflow-y:auto; padding:18px 16px 90px 16px;}
  h1{font-size:1.35em; margin-bottom:4px;}
  h2{font-size:1.1em; margin:18px 0 10px 0;}

  .card2{background:var(--card2);}
  .btn{
    display:inline-block; background:var(--acc); color:#fff; border:none; border-radius:12px;
    padding:13px 20px; font-size:1em; font-weight:600; cursor:pointer; text-align:center;
  }
  .btn:active{transform:scale(.97);}
  .btn.full{display:block; width:100%;}
  .btn.green{background:var(--acc2); color:#06281c;}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--txt);}
  .btn.small{padding:8px 14px; font-size:.9em; border-radius:10px;}
  .btn.warn{background:var(--warn); color:#3a2a00;}
  .btn.red{background:var(--red); color:#fff;}
  .btn:disabled{opacity:.4; cursor:default;}
  .row{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .grow{flex:1;}
  .pill{background:var(--card2); border:1px solid var(--line); border-radius:999px; padding:4px 12px; font-size:.8em; color:var(--dim);}
  .big{font-size:1.5em; font-weight:700;}
  .en{font-size:1.15em; font-weight:600; line-height:1.35;}
  .pt{color:var(--dim); margin-top:3px;}
  .say{color:var(--warn); font-size:.85em; margin-top:3px; font-style:italic;}
  .center{text-align:center;}
  .mt{margin-top:12px;} .mb{margin-bottom:12px;}
  nav{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:560px;
    background:var(--card); border-top:1px solid var(--line); display:flex; z-index:50;
  }
  nav button{
    flex:1; background:none; border:none; color:var(--dim); padding:10px 2px 12px 2px;
    font-size:.68em; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  nav button .ico{font-size:1.6em;}
  nav button.on{color:var(--acc);}
  .prog{height:8px; background:var(--card2); border-radius:99px; overflow:hidden; margin:8px 0;}
  .prog>div{height:100%; background:linear-gradient(90deg,var(--acc),var(--acc2)); border-radius:99px; transition:width .3s;}
  .grid7{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
  .cell{aspect-ratio:1; border-radius:8px; background:var(--card2); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-size:.75em; color:var(--dim); cursor:pointer;}
  .cell.done{background:var(--acc2); color:#06281c; border-color:var(--acc2); font-weight:700;}
  .cell.today{border:2px solid var(--acc); color:var(--txt);}
  .cell.lock{opacity:.45;}
  .phrase-row{border-bottom:1px solid var(--line); padding:12px 0;}
  .phrase-row:last-child{border-bottom:none;}
  .opt{display:block; width:100%; text-align:left; background:var(--card2); border:1px solid var(--line);
    color:var(--txt); border-radius:12px; padding:13px 14px; font-size:1em; margin-bottom:8px; cursor:pointer;}
  .opt.ok{background:#1d4634; border-color:var(--acc2);}
  .opt.bad{background:#4a2323; border-color:var(--red);}
  .tag{font-size:.7em; background:var(--acc); color:#fff; border-radius:6px; padding:2px 7px; vertical-align:middle;}
  .mic-status{min-height:24px; color:var(--warn); font-size:.9em;}
  input[type=range]{width:100%;}
  input[type=text]{width:100%; background:var(--card2); border:1px solid var(--line); color:var(--txt);
    border-radius:12px; padding:12px 14px; font-size:1em;}
  select{background:var(--card2); border:1px solid var(--line); color:var(--txt); border-radius:10px; padding:8px; max-width:100%;}
  .score-big{font-size:2.4em; font-weight:800;}
  .flash{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:28px 18px; text-align:center; min-height:180px;
    display:flex; flex-direction:column; justify-content:center; gap:8px;}
  .streak{font-size:1.05em;}
  .toast{position:fixed; top:14px; left:50%; transform:translateX(-50%); background:var(--acc2); color:#06281c;
    padding:10px 18px; border-radius:12px; font-weight:700; z-index:99; display:none;}
  .speaker-a{color:var(--acc); font-weight:700;} .speaker-b{color:var(--acc2); font-weight:700;}
  .checkitem{display:flex; gap:10px; align-items:flex-start; padding:8px 0; border-bottom:1px solid var(--line);}
  .checkitem input{width:20px; height:20px; margin-top:2px;}
</style>

const DEFAULT_STATE = { done:{}, dates:[], cards:{}, rate:1, slowRate:0.65, voiceName:"", quizScores:{}, shadowScores:{} };
let S = JSON.parse(JSON.stringify(DEFAULT_STATE));
let sb = null, USER = null, LS_KEY = null, ACCESS_TOKEN = null;

function blank(){ return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
function loadLocal(){
  try{ const s = JSON.parse(localStorage.getItem(LS_KEY)); if(s) return Object.assign(blank(), s); }catch(e){}
  return blank();
}
function persistLocal(){ if(LS_KEY) try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){} }

/* Merge de UNIÃO entre dois estados: progresso nunca se perde por corrida
   de timestamps — dias feitos somam, cartão mais avançado vence, nota máxima fica. */
function mergeStates(a, b){
  a = a || blank(); b = b || blank();
  const out = blank();
  out.resetAt = Math.max(a.resetAt||0, b.resetAt||0);
  const dead = s => (out.resetAt && (s._ts||0) < out.resetAt); // lado anterior a um reset não contribui
  const A = dead(a) ? blank() : a, B = dead(b) ? blank() : b;
  const newer = ((B._ts||0) >= (A._ts||0)) ? B : A;
  out.rate = newer.rate!=null ? newer.rate : out.rate;
  out.slowRate = newer.slowRate!=null ? newer.slowRate : out.slowRate;
  out.voiceName = newer.voiceName || "";
  Object.assign(out.done, A.done||{}, B.done||{});
  out.dates = [...new Set([...(A.dates||[]), ...(B.dates||[])])].sort();
  const ids = new Set([...Object.keys(A.cards||{}), ...Object.keys(B.cards||{})]);
  ids.forEach(id=>{
    const ca=(A.cards||{})[id], cb=(B.cards||{})[id];
    out.cards[id] = !ca ? cb : !cb ? ca :
      (((cb.reps||0) > (ca.reps||0)) || ((cb.reps||0)===(ca.reps||0) && (cb.due||"") >= (ca.due||"")) ? cb : ca);
  });
  ["quizScores","shadowScores"].forEach(k=>{
    const keys = new Set([...Object.keys(A[k]||{}), ...Object.keys(B[k]||{})]);
    keys.forEach(q=> out[k][q] = Math.max((A[k]||{})[q]||0, (B[k]||{})[q]||0));
  });
  out._ts = Math.max(A._ts||0, B._ts||0, 1);
  return out;
}

function save(){
  S._ts = Date.now();
  persistLocal();
  cloudDirty = true; SYNC = "saving"; renderSync();
  clearTimeout(cloudTimer); cloudTimer = setTimeout(flushCloud, 1500);
}
async function flushCloud(){
  if(!sb || !USER || !cloudDirty || !cloudLoaded) return;
  if(flushing){ clearTimeout(retryTimer); retryTimer = setTimeout(flushCloud, 1200); return; }
  flushing = true; cloudDirty = false;
  try{
    // upload não-destrutivo: lê o que está na nuvem, une com o local e grava a união —
    // outro aparelho publicando ao mesmo tempo nunca é apagado
    const {data, error: e1} = await sb.from("linguas_progress").select("state").eq("user_id", USER.id).maybeSingle();
    if(e1) throw e1;
    if(data && data.state && Object.keys(data.state).length){ S = mergeStates(S, data.state); persistLocal(); }
    const {error} = await sb.from("linguas_progress")
      .upsert({user_id: USER.id, state: S, updated_at: new Date().toISOString()});
    if(error) throw error;
    SYNC = "ok";
  }catch(e){
    cloudDirty = true; SYNC = "offline";
    clearTimeout(retryTimer); retryTimer = setTimeout(flushCloud, 10000); // tenta de novo sozinho
  }
  flushing = false; renderSync();
}
/* Descarga garantida ao fechar a aba: fetch com keepalive sobrevive ao unload */
function flushBeacon(){
  if(!cloudDirty || !USER || !ACCESS_TOKEN || !cloudLoaded) return;
  try{
    fetch(SB_URL + "/rest/v1/linguas_progress?on_conflict=user_id", {
      method: "POST", keepalive: true,
      headers: { "apikey": SB_KEY, "Authorization": "Bearer "+ACCESS_TOKEN,
                 "Content-Type": "application/json", "Prefer": "resolution=merge-duplicates" },
      body: JSON.stringify({user_id: USER.id, state: S, updated_at: new Date().toISOString()})
    });
    cloudDirty = false;
  }catch(e){}
}
window.addEventListener("pagehide", flushBeacon);
window.addEventListener("beforeunload", flushBeacon);
document.addEventListener("visibilitychange", ()=>{ if(document.hidden) flushBeacon(); });
function renderSync(){
  const el = document.getElementById("syncpill"); if(!el) return;
  el.textContent = SYNC==="ok" ? "☁️ salvo" : SYNC==="saving" ? "⏳ salvando..." : "📴 offline — salvo no aparelho";
  el.style.color = SYNC==="offline" ? "var(--warn)" : "var(--dim)";

async function enterApp(session){
  USER = { id: session.user.id,
           name: (session.user.user_metadata && session.user.user_metadata.name) || "",
           username: (session.user.user_metadata && session.user.user_metadata.username) || "" };

    if(error) loadErr = true;

      cloudLoaded = true;
      if(data && data.state && Object.keys(data.state).length) cloud = data.state;
    }
  }catch(e){ loadErr = true; }
  if(loadErr){
    // NUNCA publica por cima da nuvem sem antes conseguir ler — evita perda de progresso
    SYNC = "offline";
    setTimeout(retryCloudLoad, 8000);

  }
  persistLocal();
  APP_READY = true;
  document.getElementById("nav").style.display = "flex";
  TAB = "home"; LESSON = null; render();

async function retryCloudLoad(){
  if(!sb || !USER || cloudLoaded) return;
  try{
    const {data, error} = await sb.from("linguas_progress").select("state, updated_at").eq("user_id", USER.id).maybeSingle();
    if(error) throw error;
    cloudLoaded = true;
    if(data && data.state && Object.keys(data.state).length){
      S = mergeStates(S, data.state); persistLocal();
      if(TAB!=="lesson") render();
    }
    SYNC = "ok"; cloudDirty = true; flushCloud();
  }catch(e){ setTimeout(retryCloudLoad, 10000); }
  renderSync();
}
async function boot(){
  renderLoading();
  if(!window.supabase){ renderLogin("Não consegui carregar o sistema. Verifique a internet e recarregue a página (F5)."); return; }
  sb = window.supabase.createClient(SB_URL, SB_KEY);
  sb.auth.onAuthStateChange((event, session)=>{
    ACCESS_TOKEN = session ? session.access_token : null;
    if(event === "SIGNED_OUT" && USER){
      persistLocal();
      USER = null; cloudLoaded = false; APP_READY = false; cloudDirty = false;
      renderLogin("Sua sessão expirou. Entre novamente para continuar.");
    }
  });
  try{
    const {data:{session}} = await sb.auth.getSession();
    if(session) await enterApp(session); else renderLogin();
  }catch(e){ renderLogin(); }
}

/* ---------- UTILIDADES ---------- */
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function addDays(str, n){ const [y,m,d]=str.split("-").map(Number); const dt=new Date(y,m-1,d+n);
  return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.style.display="block"; setTimeout(()=>t.style.display="none", 2200); }
function daysToTrip(){ return Math.max(0, Math.ceil((TRIP_DATE - new Date())/(1000*60*60*24))); }

function dayList(){ // lista linear de 49 dias: {w, d, day}
  const out=[]; WEEKS.forEach((wk,w)=>wk.days.forEach((day,d)=>out.push({w, d, day}))); return out;
}
const DAYS = dayList();
function dayId(w,d){ return "w"+w+"d"+d; }
function currentDayIdx(){ for(let i=0;i<DAYS.length;i++){ if(!S.done[dayId(DAYS[i].w,DAYS[i].d)]) return i; } return DAYS.length-1; }
function phraseId(w,d,i){ return "w"+w+"d"+d+"p"+i; }
function allPhrases(){ const out=[]; WEEKS.forEach((wk,w)=>wk.days.forEach((day,d)=>{ if(day.p) day.p.forEach((p,i)=>out.push({id:phraseId(w,d,i), en:p[0], pt:p[1], say:p[2], w, d})); })); return out; }
const PHRASES = allPhrases();
const PHRASE_BY_ID = {}; PHRASES.forEach(p=>PHRASE_BY_ID[p.id]=p);

function streak(){
  const set = new Set(S.dates); let n=0; let d=todayStr();
  if(!set.has(d)) d = addDays(d,-1); // hoje ainda não fez → conta a partir de ontem
  while(set.has(d)){ n++; d=addDays(d,-1); }
  return n;
}
function markPracticedToday(){ const t=todayStr(); if(!S.dates.includes(t)){ S.dates.push(t); save(); } }

let VOICES = [];
function loadVoices(){ VOICES = speechSynthesis.getVoices().filter(v=>v.lang.toLowerCase().startsWith("en")); }
if("speechSynthesis" in window){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }
function getVoice(){
  if(!VOICES.length) loadVoices();
  if(S.voiceName){ const v=VOICES.find(v=>v.name===S.voiceName); if(v) return v; }
  return VOICES.find(v=>/en-US/i.test(v.lang)) || VOICES[0] || null;
}
let speakQueue = null;
function speak(text, rate, onend){
  if(!("speechSynthesis" in window)){ toast("Seu navegador não tem áudio de voz. Use Edge ou Chrome."); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.replace(/"/g,""));
  u.lang = "en-US"; const v = getVoice(); if(v) u.voice = v;
  u.rate = rate || S.rate; u.pitch = 1;
  if(onend) u.onend = onend;
  speechSynthesis.speak(u);
}
function speakList(items, rate, gapMs, onAll){ // toca uma lista em sequência
  speechSynthesis.cancel();
  let i = 0;
  function next(){
    if(i >= items.length){ if(onAll) onAll(); return; }
    const item = items[i]; i++;
    if(item.before) item.before();
    speak(item.text, rate, ()=> setTimeout(next, gapMs));
  }
  next();
}
function stopAudio(){
  if("speechSynthesis" in window) speechSynthesis.cancel();
  killRecog();
}

/* ---------- RECONHECIMENTO DE VOZ ---------- */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog = null, recogGen = 0, MIC_FAILS = 0;
function killRecog(){
  if(recog){ try{ recog.onresult=null; recog.onerror=null; recog.onend=null; recog.abort(); }catch(e){} recog=null; }
}
function listen(onResult, onErr){
  if(!SR){ onErr("no-support"); return; }
  killRecog();                                    // clique duplo no 🎤 não gera mais "aborted"
  if("speechSynthesis" in window) speechSynthesis.cancel(); // TTS falando atrapalha a captura
  const gen = ++recogGen;
  try{
    recog = new SR(); recog.lang = "en-US"; recog.interimResults = false; recog.maxAlternatives = 3;
    recog.onresult = e => { if(gen!==recogGen) return; MIC_FAILS = 0; const alts=[]; for(const r of e.results[0]) alts.push(r.transcript); onResult(alts); };
    recog.onerror = e => { if(gen!==recogGen) return; onErr(e.error); };
    recog.start();
  }catch(e){ onErr("error"); }
}
const IS_IOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
function micFailHtml(err){
  MIC_FAILS++;
  let dica;
  if(err==="aborted"||err==="network"||err==="service-not-allowed"){
    dica = IS_IOS
      ? "O reconhecimento falhou. No iPhone, use o <b>Safari</b> e ative o Ditado (Ajustes → Geral → Teclado → Ativar Ditado). Por enquanto, avalie você mesmo:"
      : "O serviço de reconhecimento do seu navegador falhou — isso é comum no <b>Edge</b>. Para a nota automática de pronúncia, use o <b>Chrome</b>. Por enquanto, avalie você mesmo:";
  } else {
    dica = `Não consegui ouvir (${esc(String(err))}). Tente de novo, ou avalie você mesmo:`;
  }
  return `${dica} <button class="btn small green" onclick="selfGrade(85)">Falei bem</button> <button class="btn small warn" onclick="selfGrade(50)">Repetir</button>`;
}
const SELF_EVAL_HTML = `Como você se saiu falando em voz alta? <button class="btn small green" onclick="selfGrade(85)">Falei bem</button> <button class="btn small warn" onclick="selfGrade(50)">Preciso repetir</button>`;
const MIC_BTN = () => SR && MIC_FAILS<2 ? "🎤 Falar" : "📝 Autoavaliar";
const MIC_NOTE = () => (SR && MIC_FAILS<2) ? "" :
  `<div class="dim mt" style="font-size:.75em;">💡 Nota automática de pronúncia indisponível aqui — no <b>iPhone use o Safari</b>; no computador/Android, o <b>Chrome</b>. A autoavaliação treina igual: o que importa é falar em voz alta.</div>`;
function norm(s){ return s.toLowerCase().replace(/["""'''.,!?;:()-]/g," ").replace(/\s+/g," ").trim(); }
function lev(a,b){
  const m=a.length, n=b.length; if(!m) return n; if(!n) return m;
  let prev = Array.from({length:n+1},(_,j)=>j);
  for(let i=1;i<=m;i++){ const cur=[i];
    for(let j=1;j<=n;j++) cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+(a[i-1]===b[j-1]?0:1));
    prev=cur; }
  return prev[n];
}
function similarity(target, spoken){
  const t=norm(target), s=norm(spoken);
  if(!t.length) return 0;
  const d = lev(t,s);
  return Math.max(0, Math.round(100*(1 - d/Math.max(t.length,s.length))));
}
function bestSimilarity(target, alts){ return Math.max(...alts.map(a=>similarity(target,a))); }

/* ---------- SRS (repetição espaçada) ---------- */
function getCard(id){ if(!S.cards[id]) S.cards[id]={iv:0, ease:2.5, due:todayStr(), reps:0, lapses:0}; return S.cards[id]; }
function gradeCard(id, g){ // 0=errei 1=difícil 2=bom 3=fácil
  const c = getCard(id);
  if(g===0){ c.iv=0; c.due=todayStr(); c.lapses++; c.ease=Math.max(1.3, c.ease-0.2); }
  else{
    if(c.iv===0){ c.iv = (g===3)?2:1; }
    else{ const f = g===1?1.2 : g===2?c.ease : c.ease*1.4; c.iv = Math.max(c.iv+1, Math.round(c.iv*f)); }
    if(g===3) c.ease += 0.15;
    c.iv = Math.min(c.iv, 60);
    c.due = addDays(todayStr(), c.iv);
  }
  c.reps++; save();
}
function dueCards(){ const t=todayStr(); return Object.keys(S.cards).filter(id=>S.cards[id].due<=t && PHRASE_BY_ID[id]); }
function introducedIds(){ // frases de dias já iniciados/concluídos
  const out=[]; const cur=currentDayIdx();
  for(let i=0;i<=cur && i<DAYS.length;i++){ const {w,d,day}=DAYS[i]; if(day.p) day.p.forEach((_,pi)=>out.push(phraseId(w,d,pi))); }
  return out;
}

function deVoice(){
  if(!("speechSynthesis" in window)) return null;
  const vs = speechSynthesis.getVoices();
  return vs.find(v=>/de[-_]DE/i.test(v.lang)) || vs.find(v=>v.lang.toLowerCase().startsWith("de")) || null;
}
function speakDe(text){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.replace(/\.\.\./g,""));
  u.lang = "de-DE"; const v = deVoice(); if(v) u.voice = v;
  u.rate = 0.85;
  speechSynthesis.speak(u);
}
function playAllGerman(){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  let i = 0;
  function next(){
    if(i >= GERMAN.length) return;
    const u = new SpeechSynthesisUtterance(GERMAN[i][0].replace(/\.\.\./g,""));
    u.lang = "de-DE"; const v = deVoice(); if(v) u.voice = v; u.rate = 0.85;
    u.onend = ()=> setTimeout(next, 800);
    i++; speechSynthesis.speak(u);
  }
  next();
}

/* Bloco 4: Quiz */
function buildQuiz(){
  const L=LESSON;
  let pool;
  if(L.day.allWeeks) pool = PHRASES.filter(p=>introducedIds().includes(p.id));
  else if(L.day.review){ // frases da semana
    pool = PHRASES.filter(p=>p.w===L.w);
  } else pool = L.day.p.map((_,i)=>PHRASE_BY_ID[phraseId(L.w,L.d,i)]);
  pool = shuffle(pool);
  const n = Math.min(L.day.allWeeks?12:8, pool.length);
  const qs = [];
  for(let i=0;i<n;i++){
    const p = pool[i];
    // distratores sem colisão: nunca com o mesmo inglês OU português da resposta, nem repetidos entre si
    const others = []; const seen = new Set([norm(p.en), norm(p.pt)]);
    for(const x of shuffle(PHRASES)){
      if(x.id===p.id || seen.has(norm(x.en)) || seen.has(norm(x.pt))) continue;
      seen.add(norm(x.en)); seen.add(norm(x.pt)); others.push(x);
      if(others.length===3) break;
    }
    const type = (i%3===2) ? "audio" : (i%2===0 ? "pt2en" : "en2pt");
    let prompt, correct, opts;
    if(type==="pt2en"){ prompt = "Como se diz: “"+p.pt+"”"; correct=p.en; opts=shuffle([p.en, ...others.map(o=>o.en)]); }
    else if(type==="en2pt"){ prompt = "O que significa: “"+p.en+"”"; correct=p.pt; opts=shuffle([p.pt, ...others.map(o=>o.pt)]); }
    else { prompt="🎧 Ouça e escolha o significado:"; correct=p.pt; opts=shuffle([p.pt, ...others.map(o=>o.pt)]); }
    qs.push({type, prompt, correct, opts, en:p.en, answered:false, pick:null});
  }
  L.quiz = qs; L.qi = 0; L.score = 0;
}
function blockQuiz(){
  const L=LESSON;
  if(!L.quiz) buildQuiz();
  if(L.qi >= L.quiz.length){
    const pct = Math.round(100*L.score/L.quiz.length);
    S.quizScores[dayId(L.w,L.d)] = pct; save();
    return lessonHeader()+`

      <div class="score-big" style="color:${pct>=70?'var(--acc2)':'var(--warn)'}">${pct}%</div>
      <div class="dim">${pct>=90?"Excepcional! 🏆":pct>=70?"Muito bom! Aprovado. ✅":"Abaixo de 70% — refaça os flashcards deste dia amanhã. 💪"}</div>
    </div>
    <button class="btn full green" onclick="nextBlock()">Finalizar o dia →</button>`;
  }
  const q = L.quiz[L.qi];
  return lessonHeader()+`
  <div class="dim center mb">Pergunta ${L.qi+1} de ${L.quiz.length} · Acertos: ${L.score}</div>
  <div class="card">
    <b>${esc(q.prompt)}</b>
    ${q.type==="audio"?`<div class="mt"><button class="btn small" onclick="speak(${JSON.stringify(q.en).replace(/"/g,"&quot;")})">▶ Ouvir de novo</button></div>`:""}
  </div>
  ${q.opts.map((o,i)=>{
    let cls="";
    if(q.answered){ if(o===q.correct) cls="ok"; else if(i===q.pick) cls="bad"; }
    return `<button class="opt ${cls}" onclick="quizPick(${i})" ${q.answered?"disabled":""}>${esc(o)}</button>`;
  }).join("")}
  ${q.answered?`<button class="btn full mt" onclick="quizNext()">${L.qi<L.quiz.length-1?"Próxima →":"Ver resultado →"}</button>`:""}`;
}
function quizPick(i){
  const L=LESSON; const q=L.quiz[L.qi];
  if(q.answered) return;
  q.answered=true; q.pick=i;
  if(q.opts[i]===q.correct){ L.score++; }
  speak(q.en);
  render();
}

function micTestDialog(target){
  const L=LESSON; const idx=L.i; const day=L.day;
  const micEl=()=>document.getElementById("mic");
  if(!SR || MIC_FAILS>=2){ const el=micEl(); if(el) el.innerHTML = SELF_EVAL_HTML; return; }
  const el=micEl(); if(el) el.textContent="🎤 Ouvindo... fale agora!";
  listen(alts=>{
    if(!LESSON || LESSON.day!==day) return;
    const sc=bestSimilarity(target,alts);
    LESSON.shadowBest[idx]=Math.max(LESSON.shadowBest[idx]||0,sc);
    if(LESSON.block===1 && LESSON.i===idx) render();
  }, err=>{
    if(!LESSON || LESSON.day!==day) return;
    const e2=micEl(); if(!e2) return;
    e2.innerHTML = err==="not-allowed"
      ? "Permita o microfone no navegador para usar esta função."
      : micFailHtml(err);
  });
}

/* ---------- TELA: FRASES (Modo Viagem) ---------- */
let SEARCH = "";
function viewPhrases(){
  const q = norm(SEARCH);
  let html = `<h1>🧳 Modo Viagem</h1><div class="dim mb">Seu tradutor de bolso: toque ▶ para o app falar por você, ou mostre a tela.</div>
  <input type="text" placeholder="🔎 Buscar frase... (ex.: banheiro, taxi, conta)" value="${esc(SEARCH)}" oninput="SEARCH=this.value;renderBody()" class="mb">
  <div id="phrasesBody">`;
  html += phrasesBody();
  return html+"</div>";
}
function phrasesBody(){
  const q = norm(SEARCH);
  let html="";
  WEEKS.forEach((wk,w)=>{
    let items=[];
    wk.days.forEach((day,d)=>{ if(day.p) day.p.forEach((p,i)=>{
      if(!q || norm(p[0]).includes(q) || norm(p[1]).includes(q)) items.push({p,id:phraseId(w,d,i)});
    });});
    if(!items.length) return;
    html += `<div class="card"><b>${["🟢","✈️","🏨","🍽️","🚆","🛍️","💬"][w]} ${esc(wk.t)}</b>`;
    items.forEach(({p,id})=>{
      html += `<div class="phrase-row"><div class="row">
        <button class="btn small" onclick="speak(PHRASE('${id}'), S.slowRate*1.15)">▶</button>
        <div class="grow"><div class="en" style="font-size:1em;">${esc(p[0])}</div><div class="pt">${esc(p[1])}</div></div>
      </div></div>`;
    });
    html += `</div>`;
  });
  return html || `<div class="card dim center">Nada encontrado. Tente outra palavra.</div>`;
}
function renderBody(){ document.getElementById("phrasesBody").innerHTML = phrasesBody(); }

    <div class="dim mt">Voz do inglês:</div>

  </div>
  <div class="card">
    <b>👤 Conta</b>

  </div>
  <div class="card card2">
    <b>🗑️ Zona de perigo</b>
    <div class="dim mb">Apaga todo o SEU progresso (só o seu) e recomeça do dia 1.</div>
    <button class="btn red small" onclick="resetAll()">Resetar tudo</button>
  </div>`;
}
async function resetAll(){
  if(!confirm("Apagar TODO o seu progresso? Isso não afeta os outros usuários.")) return;
  const empty = blank(); empty._ts = Date.now(); empty.resetAt = empty._ts; // tombstone: impede o progresso antigo de "ressuscitar" no merge
  try{
    const {error} = await sb.from("linguas_progress").upsert({user_id: USER.id, state: empty, updated_at: new Date().toISOString()});
    if(error) throw error;
  }catch(e){ alert("Não consegui resetar na nuvem. Verifique a internet e tente de novo."); return; }
  try{ localStorage.removeItem(LS_KEY); localStorage.removeItem("inglesTurbo"); }catch(e){}
  location.reload();
}

    <div class="dim mt">
    1. <b>Shadowing</b> (já está no app): repita imediatamente após o áudio, imitando ritmo e entonação como um papagaio.<br><br>
    2. <b>Narração da vida:</b> narre o que você faz, em inglês simples: "I'm drinking coffee. I'm tired. Let's go!" 5 min/dia no chuveiro ou no trânsito.<br><br>
    3. <b>Teatro de um homem só:</b> encene as duas partes dos diálogos do app em voz alta (você é o garçom E o cliente).<br><br>

  </div>

    <b>🧪 A metodologia por trás do app</b>
    <div class="dim mt">

    • <b>Krashen (input compreensível):</b> você sempre ouve ANTES de falar, com tradução à mão.<br>
    • <b>Output imediato:</b> toda frase ouvida é falada em voz alta no mesmo minuto — é isso que destrava a boca.<br>
